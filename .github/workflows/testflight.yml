name: Upload to Testflight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Optional TestFlight release notes'
        required: false
        default: ''
      testflight_groups:
        description: 'Optional TestFlight group names, comma-separated'
        required: false
        default: ''
      distribute_external:
        description: 'Distribute to external TestFlight groups'
        required: true
        default: false
        type: boolean
      notify_external_testers:
        description: 'Notify external testers'
        required: true
        default: false
        type: boolean
      skip_waiting_for_build_processing:
        description: 'Skip waiting for TestFlight processing'
        required: true
        default: false
        type: boolean
  pull_request:
    types:
      - closed
    branches:
      - 'release/*'
    paths-ignore:
      - 'fastlane/metadata/**'
      - 'fastlane/screenshots/**'
  push:
    branches:
      - 'release/*'
    paths-ignore:
      - 'fastlane/metadata/**'
      - 'fastlane/screenshots/**'

permissions:
  contents: read

jobs:
  build:
    if: (github.event_name != 'pull_request' || github.event.pull_request.merged == true)
    runs-on: macos-15

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CI secrets
        env:
          RUUVI_GITHUB_APP_CLIENT_ID: ${{ secrets.RUUVI_GITHUB_APP_CLIENT_ID }}
          RUUVI_GITHUB_APP_PRIVATE_KEY: ${{ secrets.RUUVI_GITHUB_APP_PRIVATE_KEY }}
          APP_STORE_CONNECT_API_KEY_JSON_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BASE64 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_CERTIFICATE_PASSWORD: ${{ secrets.MATCH_CERTIFICATE_PASSWORD }}
        run: |
          bash .github/scripts/validate_ci_secrets.sh \
            RUUVI_GITHUB_APP_CLIENT_ID \
            RUUVI_GITHUB_APP_PRIVATE_KEY \
            APP_STORE_CONNECT_API_KEY_JSON_BASE64 \
            MATCH_PASSWORD \
            MATCH_CERTIFICATE_PASSWORD

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RUUVI_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.RUUVI_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            com.ruuvi.station.ios.certificates
            com.ruuvi.station.ios.keystore

      - name: Configure private repository access
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/ruuvi/".insteadOf "git@github.com:ruuvi/"

      - name: Create App Store Connect API key file
        env:
          APP_STORE_CONNECT_API_KEY_JSON_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BASE64 }}
        run: |
          ASC_API_KEY_PATH="$RUNNER_TEMP/asc_api_key.json"
          printf "%s" "$APP_STORE_CONNECT_API_KEY_JSON_BASE64" | base64 --decode > "$ASC_API_KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$ASC_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Remove existing localisation directory
        run: rm -rf ${{ github.workspace }}/station.localization

      - name: Clone localisation submodule
        run: git clone -b dev https://github.com/ruuvi/station.localization.git ${{ github.workspace }}/station.localization

      - name: Increment build number
        run: |
          make set_build_number

      - name: Install Ruby dependencies
        run: |
          bundle install

      - name: Tools cache
        uses: actions/cache@v4
        with:
          path: .tools/
          key: ${{ runner.os }}-tools-${{ hashFiles('/.tools/') }}
          restore-keys: |
            ${{ runner.os }}-tools-

      - name: Make xcodeproj
        run: |
          make xcodeproj

      - name: SPM Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/spm
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Ruuvi.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Ruuvi.xcodeproj \
            -scheme station \
            -clonedSourcePackagesDirPath ${{ runner.temp }}/spm

      - name: Read app metadata
        run: |
          APP_VERSION=$(sed -n 's/^APP_VERSION: &APP_VERSION //p' project.yml)
          BUILD_NUMBER=$(sed -n 's/^BUILD_NUMBER: &BUILD_NUMBER //p' project.yml)
          echo "RUUVI_APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "RUUVI_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Build and upload to TestFlight
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_CERTIFICATE_PASSWORD: ${{ secrets.MATCH_CERTIFICATE_PASSWORD }}
          GITHUB_TOKEN: ${{ github.token }}
          TESTFLIGHT_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          TESTFLIGHT_GROUPS: ${{ github.event.inputs.testflight_groups }}
          TESTFLIGHT_DISTRIBUTE_EXTERNAL: ${{ github.event.inputs.distribute_external }}
          TESTFLIGHT_NOTIFY_EXTERNAL_TESTERS: ${{ github.event.inputs.notify_external_testers }}
          TESTFLIGHT_SKIP_WAITING_FOR_BUILD_PROCESSING: ${{ github.event.inputs.skip_waiting_for_build_processing }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 60
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: 5
        run: |
          bundle exec fastlane ios submit_to_testflight build_number:"$RUUVI_BUILD_NUMBER"

      - name: Clean up provisioning profiles
        if: ${{ always() }}
        run: |
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*

      - name: Collect CI logs
        if: ${{ always() }}
        run: |
          mkdir -p ci-logs/gym
          cp -R "$HOME/Library/Logs/gym/." ci-logs/gym/ 2>/dev/null || true
          cp -f report.xml ci-logs/ 2>/dev/null || true

      - name: Upload CI logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: testflight-ci-logs-${{ github.run_id }}
          path: ci-logs/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Write workflow summary
        if: ${{ always() }}
        env:
          DISTRIBUTION_CHANNEL: TestFlight
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/write_ci_summary.sh

      - name: Notify Telegram
        if: ${{ success() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          TELEGRAM_SUCCESS_MENTION: ${{ secrets.TELEGRAM_SUCCESS_MENTION }}
          TELEGRAM_SUCCESS_TITLE: TestFlight build uploaded
          TELEGRAM_SUCCESS_VERSION: ${{ env.RUUVI_APP_VERSION }}
          TELEGRAM_SUCCESS_BUILD: ${{ env.RUUVI_BUILD_NUMBER }}
          DISTRIBUTION_CHANNEL: TestFlight
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify_telegram.sh
