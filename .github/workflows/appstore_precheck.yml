name: Precheck App Store Metadata

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  precheck:
    runs-on: macos-15

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CI secrets
        env:
          APP_STORE_CONNECT_API_KEY_JSON_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BASE64 }}
        run: |
          bash .github/scripts/validate_ci_secrets.sh \
            APP_STORE_CONNECT_API_KEY_JSON_BASE64

      - name: Create App Store Connect API key file
        env:
          APP_STORE_CONNECT_API_KEY_JSON_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BASE64 }}
        run: |
          ASC_API_KEY_PATH="$RUNNER_TEMP/asc_api_key.json"
          printf "%s" "$APP_STORE_CONNECT_API_KEY_JSON_BASE64" | base64 --decode > "$ASC_API_KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$ASC_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install Ruby dependencies
        run: |
          bundle install

      - name: Run App Store precheck
        run: |
          bundle exec fastlane ios precheck_app_store_metadata

      - name: Collect CI logs
        if: ${{ always() }}
        run: |
          mkdir -p ci-logs
          cp -f report.xml ci-logs/ 2>/dev/null || true

      - name: Upload CI logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: appstore-precheck-ci-logs-${{ github.run_id }}
          path: ci-logs/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Write workflow summary
        if: ${{ always() }}
        env:
          DISTRIBUTION_CHANNEL: App Store precheck
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/write_ci_summary.sh

      - name: Notify Telegram
        if: ${{ success() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          TELEGRAM_SUCCESS_MENTION: ${{ secrets.TELEGRAM_SUCCESS_MENTION }}
          TELEGRAM_SUCCESS_TITLE: App Store metadata validation passed
          DISTRIBUTION_CHANNEL: App Store precheck
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify_telegram.sh
