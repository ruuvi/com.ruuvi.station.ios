name: Submit App Store Review

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Uploaded App Store Connect build number to submit'
        required: true
      app_version:
        description: 'Optional App Store version'
        required: false
        default: ''
      automatic_release:
        description: 'Release automatically after approval'
        required: true
        default: false
        type: boolean
      phased_release:
        description: 'Use phased release after approval'
        required: true
        default: false
        type: boolean
      confirmation:
        description: 'Type SUBMIT to submit this build for App Review'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  submit:
    runs-on: macos-15

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CI secrets
        env:
          APP_STORE_CONNECT_API_KEY_JSON_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BASE64 }}
        run: |
          bash .github/scripts/validate_ci_secrets.sh \
            APP_STORE_CONNECT_API_KEY_JSON_BASE64

      - name: Create App Store Connect API key file
        env:
          APP_STORE_CONNECT_API_KEY_JSON_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BASE64 }}
        run: |
          ASC_API_KEY_PATH="$RUNNER_TEMP/asc_api_key.json"
          printf "%s" "$APP_STORE_CONNECT_API_KEY_JSON_BASE64" | base64 --decode > "$ASC_API_KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$ASC_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install Ruby dependencies
        run: |
          bundle install

      - name: Submit App Store review
        env:
          APP_STORE_REVIEW_BUILD_NUMBER: ${{ github.event.inputs.build_number }}
          APP_STORE_REVIEW_APP_VERSION: ${{ github.event.inputs.app_version }}
          APP_STORE_AUTOMATIC_RELEASE: ${{ github.event.inputs.automatic_release }}
          APP_STORE_PHASED_RELEASE: ${{ github.event.inputs.phased_release }}
          APP_STORE_REVIEW_CONFIRMATION: ${{ github.event.inputs.confirmation }}
        run: |
          bundle exec fastlane ios submit_app_store_review

      - name: Collect CI logs
        if: ${{ always() }}
        run: |
          mkdir -p ci-logs
          cp -f report.xml ci-logs/ 2>/dev/null || true

      - name: Upload CI logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: appstore-submit-review-ci-logs-${{ github.run_id }}
          path: ci-logs/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Write workflow summary
        if: ${{ always() }}
        env:
          DISTRIBUTION_CHANNEL: App Store review
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/write_ci_summary.sh

      - name: Notify Telegram
        if: ${{ success() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          TELEGRAM_SUCCESS_MENTION: ${{ secrets.TELEGRAM_SUCCESS_MENTION }}
          TELEGRAM_SUCCESS_TITLE: App Store review submitted
          TELEGRAM_SUCCESS_VERSION: ${{ github.event.inputs.app_version }}
          TELEGRAM_SUCCESS_BUILD: ${{ github.event.inputs.build_number }}
          DISTRIBUTION_CHANNEL: App Store review
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify_telegram.sh
