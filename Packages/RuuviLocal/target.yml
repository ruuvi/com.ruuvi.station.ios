---
targets:
  RuuviLocal:
    settings:
      base:
        MERGEABLE_LIBRARY: false
        APPLICATION_EXTENSION_API_ONLY: true
    templates:
    - Framework
    sources:
    - path: Sources
      name: Local
    dependencies:
    - target: RuuviOntology
  RuuviLocalTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviLocalTests
    dependencies:
    - target: RuuviLocal
    - target: RuuviOntology
