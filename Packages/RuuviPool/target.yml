---
targets:
  RuuviPool:
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: true
    templates:
    - Framework
    sources:
    - path: Sources
      name: Pool
    dependencies:
    - target: RuuviOntology
    - target: RuuviPersistence
    - target: RuuviLocal
  RuuviPoolTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviPoolTests
    dependencies:
    - target: RuuviPool
    - target: RuuviOntology
    - package: Humidity
