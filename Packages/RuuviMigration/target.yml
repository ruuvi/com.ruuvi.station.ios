---
targets:
  RuuviMigration:
    templates:
    - Framework
    sources:
    - path: Sources
      name: Migration
    dependencies:
    - package: Humidity
    - target: RuuviOntology
    - target: RuuviLocal
    - target: RuuviPool
    - target: RuuviContext
    - target: RuuviStorage
    - target: RuuviService
  RuuviMigrationTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviMigrationTests
    dependencies:
    - target: RuuviMigration
    - target: RuuviCloud
    - target: RuuviContext
    - target: RuuviLocal
    - target: RuuviOntology
    - target: RuuviPool
    - target: RuuviService
    - target: RuuviStorage
    - package: GRDB
    - package: Humidity
