---
targets:
  RuuviOntology:
    # https://github.com/groue/GRDB.swift/issues/642
    settings:
      base:
        MERGEABLE_LIBRARY: false
        APPLICATION_EXTENSION_API_ONLY: true
    templates:
    - Framework
    sources:
    - path: Sources
      name: Ontology
    dependencies:
    - package: Humidity
    - package: BTKit
    - package: GRDB
  RuuviOntologyTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviOntologyTests
    dependencies:
    - target: RuuviOntology
    - package: BTKit
    - package: GRDB
    - package: Humidity
