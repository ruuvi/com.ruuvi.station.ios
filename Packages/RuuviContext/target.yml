---
targets:
  RuuviContext:
    # https://github.com/groue/GRDB.swift/issues/642
    settings:
      base:
        MERGEABLE_LIBRARY: false
        APPLICATION_EXTENSION_API_ONLY: true
    templates:
    - Framework
    sources:
    - path: Sources
      name: Context
    dependencies:
    - package: GRDB
    - target: RuuviOntology
  RuuviContextTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviContextTests
    dependencies:
    - target: RuuviContext
    - package: GRDB
