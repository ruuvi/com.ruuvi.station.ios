---
targets:
  RuuviReactor:
    # https://github.com/groue/GRDB.swift/issues/642
    settings:
      base:
        MERGEABLE_LIBRARY: false
    templates:
    - Framework
    sources:
    - path: Sources
      name: Reactor
    dependencies:
    - package: Humidity
    - package: GRDB
    - target: RuuviAnalytics
    - target: RuuviOntology
    - target: RuuviPersistence
    - target: RuuviContext
  RuuviReactorTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviReactorTests
    dependencies:
    - package: Humidity
    - package: GRDB
    - target: RuuviContext
    - target: RuuviReactor
    - target: RuuviPersistence
