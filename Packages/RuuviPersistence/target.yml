---
targets:
  RuuviPersistence:
    # https://github.com/groue/GRDB.swift/issues/642
    settings:
      base:
        MERGEABLE_LIBRARY: false
        APPLICATION_EXTENSION_API_ONLY: true
    templates:
    - Framework
    sources:
    - path: Sources
      name: Persistence
    dependencies:
    - package: Humidity
    - package: GRDB
    - target: RuuviOntology
    - target: RuuviContext
  RuuviPersistenceTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviPersistenceTests
    dependencies:
    - package: Humidity
    - package: GRDB
    - target: RuuviContext
    - target: RuuviPersistence
