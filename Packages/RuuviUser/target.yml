---
targets:
  RuuviUser:
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: true
    templates:
    - Framework
    sources:
    - path: Sources
      name: User
    dependencies:
    - package: KeychainAccess
  RuuviUserTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviUserTests
    dependencies:
    - target: RuuviUser
