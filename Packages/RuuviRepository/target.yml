---
targets:
  RuuviRepository:
    templates:
    - Framework
    sources:
    - path: Sources
      name: Repository
    dependencies:
    - target: RuuviOntology
    - target: RuuviPool
    - target: RuuviStorage
  RuuviRepositoryTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: station
    sources:
    - path: Tests/RuuviRepositoryTests
    dependencies:
    - target: RuuviRepository
    - target: RuuviOntology
    - target: RuuviPool
    - target: RuuviStorage
    - package: Humidity
